<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#084734"/>
      <stop offset="100%" style="stop-color:#0a5c45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CEF17B"/>
      <stop offset="100%" style="stop-color:#a8d94f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>

  <!-- Torus wireframe hint -->
  <ellipse cx="200" cy="150" rx="100" ry="60" fill="none" stroke="#CEF17B" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="200" cy="150" rx="100" ry="30" fill="none" stroke="#CEF17B" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="200" cy="150" rx="60" ry="60" fill="none" stroke="#CEF17B" stroke-width="1" opacity="0.15"/>

  <!-- Small sphere dots on the torus path -->
  <circle cx="300" cy="150" r="4" fill="#CEF17B" opacity="0.8"/>
  <circle cx="100" cy="150" r="4" fill="#CEF17B" opacity="0.8"/>
  <circle cx="200" cy="90" r="3" fill="#CEF17B" opacity="0.6"/>
  <circle cx="200" cy="210" r="3" fill="#CEF17B" opacity="0.6"/>
  <circle cx="260" cy="105" r="2.5" fill="#CEF17B" opacity="0.5"/>
  <circle cx="140" cy="195" r="2.5" fill="#CEF17B" opacity="0.5"/>

  <!-- Title -->
  <text x="380" y="130" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#CEF17B" letter-spacing="-3">
    TaurusSwap
  </text>

  <!-- Subtitle -->
  <text x="383" y="175" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#CEF17B" opacity="0.7">
    Multi-asset concentrated liquidity on Algorand
  </text>

  <!-- Tagline -->
  <text x="383" y="220" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#CEF17B" opacity="0.4" letter-spacing="4">
    SPHERE  +  TORUS  =  O(1) VERIFICATION
  </text>

  <!-- Small badges -->
  <rect x="383" y="240" width="80" height="24" rx="12" fill="#CEF17B" opacity="0.15"/>
  <text x="402" y="257" font-family="Inter, monospace" font-size="11" font-weight="600" fill="#CEF17B" opacity="0.8">150x CE</text>

  <rect x="475" y="240" width="80" height="24" rx="12" fill="#CEF17B" opacity="0.15"/>
  <text x="493" y="257" font-family="Inter, monospace" font-size="11" font-weight="600" fill="#CEF17B" opacity="0.8">n tokens</text>

  <rect x="567" y="240" width="70" height="24" rx="12" fill="#CEF17B" opacity="0.15"/>
  <text x="585" y="257" font-family="Inter, monospace" font-size="11" font-weight="600" fill="#CEF17B" opacity="0.8">3.3s</text>
</svg>
